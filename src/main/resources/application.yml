server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring:
  application:
    name: Work-Flow-Management

  datasource:
    url: jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
    out-of-order: false
    validate-migration-naming: true

  mail:
    host: ${MAIL_HOST:email-smtp.eu-central-1.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  # ===============================
  # AWS S3 CONFIGURATION
  # ===============================
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_S3_REGION}
      stack:
        auto: false
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs
    enabled: true

jwt:
  access-token:
    expiration-minutes: 15
  refresh-token:
    expiration-days: 30
    max-active-tokens: 5

app:
  mail:
    from: ${MAIL_FROM:noreply@workflow.com}
    from-name: ${MAIL_FROM_NAME:WorkFlow App}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

password-reset:
  token:
    expiration-minutes: 60
    max-active-per-user: 3

security:
  bcrypt:
    strength: 12

google:
  client-id: ${GOOGLE_CLIENT_ID}

email-verification:
  token:
    expiration-hours: 24

worker-invitation:
  token:
    expiration-days: 7

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: never

workflow:
  security:
    file:
      # MUST be a comma-separated string on a single line for @Value to read it properly
      blocked-types: application/x-msdownload,application/x-sh,application/x-bat,application/x-executable,text/html,image/svg+xml

paddle:
  api-key: ${PADDLE_API_KEY}
  webhook-secret: ${PADDLE_WEBHOOK_SECRET}
  price-id: ${PADDLE_PRICE_ID}
  api-base-url: ${PADDLE_API_BASE_URL:https://sandbox-api.paddle.com}
  trial-days: 14
  past-due-grace-days: 3
  webhook-timestamp-tolerance-seconds: 300
  success-url: ${PADDLE_SUCCESS_URL:http://localhost:5173/subscription/success}
  cancel-url: ${PADDLE_CANCEL_URL:http://localhost:5173/subscription/cancel}
