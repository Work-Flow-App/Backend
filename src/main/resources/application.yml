server:
  port: 8080

spring:
  application:
    name: Work-Flow-Management
  datasource:
    url: jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
    out-of-order: false
    validate-migration-naming: true
  mail:
    host: ${MAIL_HOST:email-smtp.eu-central-1.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs
    enabled: true

jwt:
  access-token:
    expiration-minutes: 15
  refresh-token:
    expiration-days: 30
    max-active-tokens: 5

app:
  mail:
    from: ${MAIL_FROM:noreply@workflow.com}
    from-name: ${MAIL_FROM_NAME:WorkFlow App}

password-reset:
  token:
    expiration-minutes: 60
    max-active-per-user: 3



